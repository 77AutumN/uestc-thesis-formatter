name: PII Gate + Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  redact-check:
    name: Block PII leakage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Inject private name list from secret
        env:
          REDACT_NAMES: ${{ secrets.REDACT_NAMES }}
        run: |
          if [ -n "$REDACT_NAMES" ]; then
            printf '%s\n' "$REDACT_NAMES" > .redact-names.local.txt
            echo "Loaded $(grep -c -v '^\s*\(#\|$\)' .redact-names.local.txt) private name pattern(s)."
          else
            echo "::warning::REDACT_NAMES secret not available (fork PR or unconfigured); name-list pass skipped — high-entropy patterns still enforced."
          fi

      - name: Run redaction check (tools/redact.py --check)
        run: python tools/redact.py --check .

  pytest:
    name: pytest in clean container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pandoc + Python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pandoc
          pip install --quiet -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=line
