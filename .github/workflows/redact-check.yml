name: PII Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  redact-check:
    name: Block PII leakage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run redaction check (tools/redact.py --check)
        run: python tools/redact.py --check .

      - name: Final raw-grep belt-and-suspenders
        run: |
          # Exit 0 only if no PII patterns match anywhere in the tracked tree.
          # Patterns mirror docs/redaction-spec.md.
          if git grep -nE '\b20[0-9]{11}\b|CASE-A|CASE-A|D:[\\/][Oo]pen claw|CASE-0[0-9]{2}' \
              -- ':!tools/redact.py' ':!docs/redaction-spec.md' ':!.github/workflows/redact-check.yml'; then
            echo "::error::PII patterns detected — see grep matches above."
            exit 1
          fi
          echo "CLEAN — no PII patterns in tracked tree"
